<!DOCTYPE html>
<html>
<head>
    <title>Fraud Detection Dashboard</title>
    <style>
        body { font-family: Arial; background: #111; color: white; text-align: center; }
        button { padding: 10px; margin: 10px; font-size: 16px; }
        #logs { margin-top: 20px; white-space: pre-line; }
    </style>
</head>
<body>

<h1>🚀 Fraud Detection Dashboard</h1>

<button onclick="checkFraud()">Test Transaction</button>
<button onclick="loadLogs()">View Logs</button>

<h2 id="result"></h2>

<div id="logs"></div>

<script>
async function checkFraud() {
    const response = await fetch('/predict', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'x-api-key': 'mysecurekey123'
        },
        body: JSON.stringify({
            features: [0.1, -1.2, 0.5, 0.3, -0.2, 0.4, 1.2, -0.5, 0.6, -0.7,
                       0.2, -0.1, 0.3, -0.4, 0.5, -0.6, 0.7, -0.8, 0.9, -1.0,
                       1.1, -1.2, 1.3, -1.4, 1.5, -1.6, 1.7, -1.8, 0.2]
        })
    });

    const data = await response.json();

    document.getElementById("result").innerText =
        "Fraud: " + data.fraud + " | Risk Score: " + data.risk_score;
}

async function loadLogs() {
    const response = await fetch('/logs');
    const data = await response.json();

    document.getElementById("logs").innerText = data.logs.join("");
}
</script>

</body>
</html>
